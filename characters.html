<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Characters - Rick and Morty System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="app-header">
        <div class="container nav-container">
            <a href="characters.html" class="nav-brand">
                <svg style="width:24px;height:24px;color:var(--brand-primary);" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                Citadel OS
            </a>
            
            <nav class="nav-links">
                <a href="characters.html" class="nav-link active">Characters</a>
                <a href="episodes.html" class="nav-link">Episodes</a>
                <button class="theme-toggle" aria-label="Toggle theme"></button>
                <button onclick="logout()" class="btn btn-outline" style="padding: 0.35rem 0.75rem; font-size: 0.75rem;">Logout</button>
            </nav>
        </div>
    </header>

    <main class="container main-content">
        <div class="toolbar">
            <h2>Characters Database</h2>
            <div class="search-box">
                <div class="search-icon">
                    <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
                <input type="text" id="search-input" class="form-control" placeholder="Search characters by name...">
            </div>
        </div>
        
        <div class="table-container">
            <table class="data-table" id="characters-table">
                <thead>
                    <tr>
                        <th data-sort="id">ID <span class="sort-icon">⇅</span></th>
                        <th data-sort="name">Name <span class="sort-icon">⇅</span></th>
                        <th data-sort="species">Species <span class="sort-icon">⇅</span></th>
                        <th data-sort="gender">Gender <span class="sort-icon">⇅</span></th>
                        <th data-sort="status">Status <span class="sort-icon">⇅</span></th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="6" class="text-center">Loading portal data...</td></tr>
                </tbody>
            </table>
        </div>
        
        <div class="toolbar mt-4" style="justify-content: center; gap: 1rem;">
            <button id="prev-page" class="btn btn-outline" disabled>Previous</button>
            <span id="page-info" style="font-size: 0.875rem; color: var(--text-secondary); display: flex; align-items: center;">Page 1</span>
            <button id="next-page" class="btn btn-outline">Next</button>
        </div>
    </main>

    <!-- Detail/Edit Modal -->
    <div class="modal-overlay" id="character-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title" id="modal-title">Character Details</h3>
                <button class="modal-close" onclick="closeModal()">
                    <svg style="width:24px;height:24px" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="characters.js"></script>
</body>
</html>
