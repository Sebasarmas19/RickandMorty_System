<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rick and Morty System - Password Recovery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Reset Password</h2>
                <p style="color: var(--text-secondary); font-size: 0.875rem; margin-top: 0.5rem;">Enter your email to receive a recovery link.</p>
            </div>
            
            <div id="alert-container"></div>

            <form id="recover-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="rick@citadel.com" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                    Send Recovery Link
                </button>
            </form>
            
            <div class="auth-footer">
                Remember your password? <a href="index.html" class="auth-link">Sign in</a>
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
